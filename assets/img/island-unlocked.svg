<svg width="200" height="200" viewBox="0 0 200 200" class="float-animation pulse-animation" role="img" aria-label="Odblokowana wyspa"><!-- Animated background stars --> <circle cx="25" cy="25" r="2" fill="#a78bfa" style="animation: star-twinkle 2s infinite"></circle> <circle cx="175" cy="35" r="1.5" fill="#c4b5fd" style="animation: star-twinkle 2.5s infinite 0.5s"></circle> <circle cx="45" cy="175" r="1.8" fill="#818cf8" style="animation: star-twinkle 1.8s infinite 0.2s"></circle> <circle cx="165" cy="165" r="1.5" fill="#a78bfa" style="animation: star-twinkle 2.2s infinite 0.7s"></circle> <circle cx="15" cy="100" r="1" fill="#c4b5fd" style="animation: star-twinkle 3s infinite"></circle> <circle cx="185" cy="90" r="1.2" fill="#818cf8" style="animation: star-twinkle 2.8s infinite 0.3s"></circle> <defs>
        <linearGradient id="cosmicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
         <stop offset="0%" style="stop-color:#4c1d95"></stop>
         <stop offset="50%" style="stop-color:#5b21b6"></stop>
         <stop offset="100%" style="stop-color:#1e1b4b"></stop>
        </linearGradient>
        <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
         <stop offset="0%" style="stop-color:#6d28d9"></stop>
         <stop offset="100%" style="stop-color:#4c1d95"></stop>
        </linearGradient>
        <linearGradient id="crystalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
         <stop offset="0%" style="stop-color:#a78bfa"></stop>
         <stop offset="50%" style="stop-color:#8b5cf6"></stop>
         <stop offset="100%" style="stop-color:#6d28d9"></stop>
        </linearGradient>
        <linearGradient id="treeGradient" x1="0%" y1="100%" x2="0%" y2="0%">
         <stop offset="0%" style="stop-color:#581c87"></stop>
         <stop offset="100%" style="stop-color:#7c3aed"></stop>
        </linearGradient>
        <filter id="glow">
         <feGaussianBlur stdDeviation="2" result="coloredBlur"></feGaussianBlur>
         <feMerge>
          <feMergeNode in="coloredBlur"></feMergeNode>
          <feMergeNode in="SourceGraphic"></feMergeNode>
         </feMerge>
        </filter>
       </defs> <!-- Outer glow ring --> <ellipse cx="100" cy="150" rx="75" ry="22" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"></ellipse> <!-- Floating platform with glow --> <ellipse cx="100" cy="150" rx="70" ry="20" fill="url(#groundGradient)" filter="url(#glow)"></ellipse> <!-- Main island terrain --> <path d="M35 140 Q50 100 70 110 Q85 95 100 100 Q115 90 130 105 Q150 95 165 140 Q140 155 100 155 Q60 155 35 140Z" fill="url(#cosmicGradient)" stroke="#8b5cf6" stroke-width="2"></path> <!-- Cosmic trees --> <g filter="url(#glow)">
        <path d="M65 115 L65 75" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"></path>
        <circle cx="65" cy="65" r="15" fill="url(#treeGradient)" opacity="0.8"></circle>
        <circle cx="65" cy="65" r="10" fill="#a78bfa" opacity="0.4"></circle>
       </g> <g filter="url(#glow)">
        <path d="M135 110 L135 65" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"></path>
        <circle cx="135" cy="55" r="18" fill="url(#treeGradient)" opacity="0.8"></circle>
        <circle cx="135" cy="55" r="12" fill="#a78bfa" opacity="0.4"></circle>
       </g> <!-- Glowing crystals --> <g filter="url(#glow)">
        <polygon points="95,130 100,100 105,130" fill="url(#crystalGradient)"></polygon>
        <polygon points="97,130 100,108 103,130" fill="#c4b5fd" opacity="0.6"></polygon>
       </g> <g filter="url(#glow)">
        <polygon points="52,128 58,112 64,128" fill="url(#crystalGradient)"></polygon>
       </g> <g filter="url(#glow)">
        <polygon points="140,125 148,105 156,125" fill="url(#crystalGradient)"></polygon>
       </g> <!-- Sparkle effects --> <circle cx="100" cy="95" r="3" fill="#e9d5ff" opacity="0.8"></circle> <circle cx="58" cy="108" r="2" fill="#e9d5ff" opacity="0.6"></circle> <circle cx="148" cy="100" r="2" fill="#e9d5ff" opacity="0.6"></circle>
      </svg>