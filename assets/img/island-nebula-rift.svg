<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="250" height="250">

  <defs>
    <linearGradient id="completedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <linearGradient id="completedGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <linearGradient id="greenCrystal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <linearGradient id="greenTree" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="150" rx="70" ry="20" fill="url(#completedGround)"/>

  <path
    d="M35 140 Q50 100 70 110 Q85 95 100 100 Q115 90 130 105 Q150 95 165 140 Q140 155 100 155 Q60 155 35 140Z"
    fill="url(#completedGradient)"
    stroke="#34d399"
    stroke-width="2"
  />

  <!-- left tree -->
  <path d="M60 115 L60 70" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <circle cx="60" cy="58" r="18" fill="url(#greenTree)"/>
  <circle cx="52" cy="70" r="10" fill="url(#greenTree)" opacity="0.7"/>

  <!-- right tree -->
  <path d="M140 108 L140 58" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <circle cx="140" cy="45" r="20" fill="url(#greenTree)"/>
  <circle cx="150" cy="60" r="12" fill="url(#greenTree)" opacity="0.7"/>

  <!-- trophy -->
  <polygon
    points="100,70 105,82 118,82 108,92 112,105 100,98 88,105 92,92 82,82 95,82"
    fill="url(#goldGradient)"
  />

  <!-- crystals -->
  <polygon points="75,128 82,108 89,128" fill="url(#greenCrystal)"/>
  <polygon points="115,130 123,108 131,130" fill="url(#greenCrystal)"/>

</svg>