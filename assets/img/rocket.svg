<svg width="120" height="120" viewBox="0 0 120 120" class="rocket-animation" role="img" aria-label="Rocket icon"><defs>
        <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
         <stop offset="0%" style="stop-color:#ef4444"></stop>
         <stop offset="50%" style="stop-color:#f97316"></stop>
         <stop offset="100%" style="stop-color:#eab308"></stop>
        </linearGradient>
        <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
         <stop offset="0%" style="stop-color:#fbbf24"></stop>
         <stop offset="50%" style="stop-color:#f97316"></stop>
         <stop offset="100%" style="stop-color:#ef4444"></stop>
        </linearGradient>
        <filter id="rocketGlow">
         <feGaussianBlur stdDeviation="3" result="coloredBlur"></feGaussianBlur>
         <feMerge>
          <feMergeNode in="coloredBlur"></feMergeNode>
          <feMergeNode in="SourceGraphic"></feMergeNode>
         </feMerge>
        </filter>
       </defs> <g transform="translate(60, 60) rotate(-45)"><!-- Rocket body -->
        <ellipse cx="0" cy="10" rx="12" ry="25" fill="url(#rocketGradient)" filter="url(#rocketGlow)"></ellipse> <!-- Rocket nose -->
        <path d="M-12 -15 Q0 -30 12 -15 L0 -10 Z" fill="#fbbf24" filter="url(#rocketGlow)"></path> <!-- Window -->
        <circle cx="0" cy="0" r="6" fill="#60a5fa" opacity="0.7"></circle>
        <circle cx="0" cy="0" r="4" fill="#93c5fd" opacity="0.5"></circle> <!-- Fins -->
        <path d="M-12 20 L-20 35 L-12 30 Z" fill="#dc2626" filter="url(#rocketGlow)"></path>
        <path d="M12 20 L20 35 L12 30 Z" fill="#dc2626" filter="url(#rocketGlow)"></path> <!-- Flames -->
        <ellipse cx="0" cy="40" rx="8" ry="15" fill="url(#flameGradient)" opacity="0.8">
         <animate attributeName="ry" values="15;20;15" dur="0.5s" repeatCount="indefinite"></animate>
        </ellipse>
        <ellipse cx="-5" cy="45" rx="5" ry="12" fill="#fbbf24" opacity="0.6">
         <animate attributeName="ry" values="12;16;12" dur="0.4s" repeatCount="indefinite"></animate>
        </ellipse>
        <ellipse cx="5" cy="45" rx="5" ry="12" fill="#fbbf24" opacity="0.6">
         <animate attributeName="ry" values="12;16;12" dur="0.6s" repeatCount="indefinite"></animate>
        </ellipse>
       </g> <!-- Stars --> <circle cx="20" cy="20" r="1.5" fill="#fbbf24" style="animation: sparkle 1.5s infinite"></circle> <circle cx="100" cy="30" r="1" fill="#f97316" style="animation: sparkle 2s infinite 0.5s"></circle> <circle cx="30" cy="100" r="1.2" fill="#ef4444" style="animation: sparkle 1.8s infinite 0.3s"></circle>
      </svg>